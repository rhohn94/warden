# vendor.toml — Dependency Channel intent (Grimoire seed stub).
#
# Declares each first-party dependency this repo vendors from a published
# GitHub Release. `recipe.py sync-deps` resolves → downloads → verifies sha256
# → atomic-replaces vendor/<dep>/ → writes vendor.lock. Build & runtime read
# only the committed vendor/<dep>/ bytes; the network is touched at sync time.
#
# This stub declares NO active deps — add a [deps.<name>] block per dependency.
# vendor.lock is auto-generated (do not hand-edit); commit both files plus the
# vendored bytes under vendor/<dep>/.

schema_version = 1

# Example dependency (commented out — copy, uncomment, and edit per dep):
#
# [deps.aura]
# repo = "rhohn94/design-language"   # GitHub owner/repo of the producer
# channel = "stable"                 # stable | beta (the producer's release channel)
# version = "3.20.0"                 # exact pin; sync fetches this release tag
# artifact = "aura-v3.20.0.tar.gz"   # primary release asset basename
# dest = "vendor/aura"               # repo-relative vendored destination
# kind = "asset-bundle"             # asset-bundle | vendored-crate | app-binary
# strip_components = 1               # optional, default 0 — leading path parts to drop
# extract = ["css/", "fonts/"]       # optional subset allowlist
