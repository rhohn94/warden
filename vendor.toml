# vendor.toml — Dependency Channel intent (Grimoire seed stub).
#
# Declares each first-party dependency this repo vendors from a published
# GitHub Release. `recipe.py sync-deps` resolves → downloads → verifies sha256
# → atomic-replaces vendor/<dep>/ → writes vendor.lock. Build & runtime read
# only the committed vendor/<dep>/ bytes; the network is touched at sync time.
#
# This stub declares NO active deps — add a [deps.<name>] block per dependency.
# vendor.lock is auto-generated (do not hand-edit); commit both files plus the
# vendored bytes under vendor/<dep>/.

schema_version = 1

# Aura design language — tokens-only subset. Warden is an egui app: runtime
# token *values* are consumed via obsidian's generated Rust bindings
# (obsidian_api::aura_generated::aura); this vendored subset is warden's own
# Dependency Channel record of the adopted Aura release (machine-readable
# token model + CSS custom-property reference), used for token audits and
# future binding regeneration — the build does not read it.
[deps.aura]
repo = "rhohn94/design-language"
channel = "stable"
version = "3.554.0"
artifact = "aura-v3.554.0.tar.gz"
dest = "vendor/aura"
kind = "asset-bundle"
strip_components = 1
extract = ["css/tokens.css", "dist/aura-tokens-meta.json"]

